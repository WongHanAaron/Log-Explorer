version: '3.8'

services:
  kibana:
    image: "docker.elastic.co/kibana/kibana:${KIBANA_VERSION:-8.4.0}"
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  elasticsearch:
    image: "docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-8.4.0}"
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
