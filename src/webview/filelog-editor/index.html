<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <title>Log File Line Config</title>
</head>

<body>
    <h2 id="page-title">Log File Line Config</h2>

    <form id="config-form" novalidate>
        <!-- ── Identity ─────────────────────────────────────── -->
        <div class="field-group">
            <label for="shortName">Short Name <span class="required">*</span></label>
            <input type="text" id="shortName" name="shortName" autocomplete="off" placeholder="e.g. nginx-combined" />
            <span class="error" id="shortName-error"></span>
            <span class="hint">Kebab-case identifier — used as the filename</span>
        </div>

        <div class="field-group">
            <label for="label">Label <span class="required">*</span></label>
            <input type="text" id="label" name="label" autocomplete="off" placeholder="e.g. Nginx Combined Format" />
            <span class="error" id="label-error"></span>
        </div>

        <div class="field-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="2" placeholder="Optional notes"></textarea>
        </div>

        <!-- ── Line type ────────────────────────────────────── -->
        <div class="field-group">
            <label for="lineType">Line Type <span class="required">*</span></label>
            <select id="lineType" name="lineType">
                <option value="text">Text</option>
                <option value="xml">XML</option>
                <option value="json">JSON</option>
            </select>
        </div>

        <!-- ── Text fields ──────────────────────────────────── -->
        <section id="text-section" class="type-section">
            <div class="section-header">
                <span>Fields</span>
                <button type="button" id="add-text-field" class="small-btn">+ Add Field</button>
            </div>
            <div id="text-fields"></div>
        </section>

        <!-- ── XML fields ───────────────────────────────────── -->
        <section id="xml-section" class="type-section hidden">
            <div class="field-group">
                <label for="rootXpath">Root XPath <span class="required">*</span></label>
                <input type="text" id="rootXpath" name="rootXpath" autocomplete="off" placeholder="e.g. //Event" />
            </div>
            <div class="section-header">
                <span>Field Mappings</span>
                <button type="button" id="add-xml-field" class="small-btn">+ Add Field</button>
            </div>
            <div id="xml-fields"></div>
        </section>

        <!-- ── JSON fields ──────────────────────────────────── -->
        <section id="json-section" class="type-section hidden">
            <div class="section-header">
                <span>Field Mappings</span>
                <button type="button" id="add-json-field" class="small-btn">+ Add Field</button>
            </div>
            <div id="json-fields"></div>
        </section>

        <div class="actions">
            <button type="submit" id="save-btn">Save</button>
            <button type="button" id="cancel-btn" class="secondary">Cancel</button>
        </div>

        <div class="status" id="status-bar"></div>
    </form>

    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
